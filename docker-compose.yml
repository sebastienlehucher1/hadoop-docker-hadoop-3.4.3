version: "3.9"

services:

  namenode:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: namenode
    hostname: namenode
    command: >
      bash -c "
      sudo mkdir -p /hadoop/dfs/name &&
      sudo chown -R hadoop:users /hadoop/dfs/name &&
      if [ ! -d /hadoop/dfs/name/current ]; then
        hdfs namenode -format -force -nonInteractive;
      fi &&
      hdfs namenode &
      sleep 10 &&
      /namenode-init.sh &&
      wait
      "   
    ports:
      - 9870:9870   # HDFS UI
      - 8020:8020   # HDFS RPC
    env_file:
      - ./config      
    volumes:
      - .:/workspace
      - ./api_key.txt:/run/secrets/api_key:ro
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./namenode-init.sh:/namenode-init.sh
      - ./scripts:/opt/hadoop/scripts
      - namenode_data:/hadoop/dfs/name
      - tez-share:/tez
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfs -test -e / || hdfs dfs -ls / > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - hadoop

  datanode:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: datanode
    hostname: datanode
    command: ["bash", "-c", "sudo mkdir -p /hadoop/dfs/data && sudo chown -R hadoop:users /hadoop/dfs/data && hdfs datanode"]    
    env_file:
      - ./config
    ports:
      - 9864:9864
    depends_on:
      namenode:
        condition: service_started
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "jps | grep -q DataNode && hdfs dfsadmin -report | grep -q 'Live datanodes'"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - hadoop

  resourcemanager:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: resourcemanager
    hostname: resourcemanager
    command: ["yarn", "resourcemanager"]
    ports:
        - 8088:8088
    env_file:
      - ./config    
    depends_on:
      namenode:
        condition: service_started
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro   
    networks:
      - hadoop

  nodemanager:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: nodemanager
    hostname: nodemanager
    command: ["yarn", "nodemanager"]
    env_file:
      - ./config    
    depends_on:
      namenode:
        condition: service_started
      resourcemanager:
        condition: service_started
    volumes:      
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro   
    networks:
      - hadoop

  hive-postgres:
    image: postgres:14
    container_name: hive-postgres
    hostname: hive-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - metastore_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hadoop

  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile.hive
    container_name: hive-metastore
    hostname: hive-metastore
    command: ["/bin/bash", "/start-metastore.sh"]
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SERVICE_NAME: metastore
      HADOOP_CONF_DIR: /etc/hadoop/conf
      HIVE_CONF_DIR: /opt/hive/conf     
      DB_DRIVER: postgres   
    ports:
      - 9083:9083
    depends_on:
      namenode:
        condition: service_healthy
      hive-postgres:
        condition: service_healthy
    volumes:
      - ./conf:/opt/hive/conf:ro
      - ./hadoop-config:/etc/hadoop/conf:ro      
      - ./start-metastore.sh:/start-metastore.sh    
    networks:
      - hadoop 

  hive-server:
    build:
      context: .
      dockerfile: Dockerfile.hive
    container_name: hive-server
    hostname: hive-server
    env_file: .env
    entrypoint: ["/bin/bash", "/start-hiveserver2.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SERVICE_NAME: hiveserver2
      HADOOP_CONF_DIR: /etc/hadoop/conf
      HIVE_CONF_DIR: /opt/hive/conf     
      DB_DRIVER: postgres      
    ports:
      - 10000:10000  # JDBC/Beeline
      - 10002:10002  # Web UI
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
      nodemanager:
        condition: service_started
      resourcemanager:
        condition: service_started
      hive-postgres:
        condition: service_healthy
      hive-metastore:
        condition: service_started
    volumes:
      - ./conf:/opt/hive/conf:ro
      - ./hadoop-config:/etc/hadoop/conf:ro
      - ./logs/hive-server:/opt/hive/logs
      - ./start-hiveserver2.sh:/start-hiveserver2.sh
      - tez-share:/tez
    networks:
      - hadoop

volumes:
  namenode_data:
  datanode_data:
  metastore_db_data:
  tez-share:

networks:
  hadoop:
    external: true
    name: hadoop