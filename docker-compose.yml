version: "3.9"

services:

  namenode:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: namenode
    hostname: namenode
    command: >
      bash -c "
      mkdir -p /hadoop/dfs/name &&
      chown -R hadoop:users /hadoop/dfs/name &&
      if [ ! -f /hadoop/dfs/name/current/VERSION ]; then
        hdfs namenode -format -force -nonInteractive;
      fi &&
      hdfs namenode &
      until hdfs dfs -ls / >/dev/null 2>&1; do
          sleep 2
      done &&
      /namenode-init.sh &&
      wait
      "   
    ports:
      - 9870:9870   # HDFS UI
      - 8020:8020   # HDFS RPC     
    env_file:
      - ./config
    environment:
          ENSURE_NAMENODE_DIR: "/hadoop/dfs/name"
    secrets:
      - api_key      
    volumes:
      - ..:/workspace      
      - ./hadoop-config/core-site.xml:/etc/hadoop/conf/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/etc/hadoop/conf/hdfs-site.xml:ro
      - ./hadoop-config/yarn-site.xml:/etc/hadoop/conf/yarn-site.xml:ro
      - ./hadoop-config/mapred-site.xml:/etc/hadoop/conf/mapred-site.xml:ro  
      - ./namenode-init.sh:/namenode-init.sh
      - ./scripts:/opt/hadoop/scripts
      - namenode_data:/hadoop/dfs/name
      - tez-share:/tez
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfs -test -e / || hdfs dfs -ls / > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - hadoop

  datanode:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: datanode
    hostname: datanode
    command: ["bash", "-c", "mkdir -p /hadoop/dfs/data && chown -R hadoop:users /hadoop/dfs/data && hdfs datanode"]    
    env_file:
      - ./config
    ports:
      - 9864:9864
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./hadoop-config/core-site.xml:/etc/hadoop/conf/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/etc/hadoop/conf/hdfs-site.xml:ro
      - ./hadoop-config/yarn-site.xml:/etc/hadoop/conf/yarn-site.xml:ro
      - ./hadoop-config/mapred-site.xml:/etc/hadoop/conf/mapred-site.xml:ro  
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfsadmin -report | grep -A5 'Live datanodes' | grep -q datanode"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - hadoop

  resourcemanager:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: resourcemanager
    hostname: resourcemanager
    command: ["yarn", "resourcemanager"]
    ports:
        - 8088:8088
    env_file:
      - ./config    
    depends_on:
      namenode:
        condition: service_healthy
    volumes:
      - ./hadoop-config/core-site.xml:/etc/hadoop/conf/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/etc/hadoop/conf/hdfs-site.xml:ro
      - ./hadoop-config/yarn-site.xml:/etc/hadoop/conf/yarn-site.xml:ro
      - ./hadoop-config/mapred-site.xml:/etc/hadoop/conf/mapred-site.xml:ro    
    networks:
      - hadoop

  nodemanager:
    build:
      context: .
      dockerfile: Dockerfile.hadoop
    container_name: nodemanager
    hostname: nodemanager
    command: ["yarn", "nodemanager"]
    env_file:
      - ./config    
    depends_on:
      namenode:
        condition: service_healthy
      resourcemanager:
        condition: service_started
    volumes:      
      - ./hadoop-config/core-site.xml:/etc/hadoop/conf/core-site.xml:ro
      - ./hadoop-config/hdfs-site.xml:/etc/hadoop/conf/hdfs-site.xml:ro
      - ./hadoop-config/yarn-site.xml:/etc/hadoop/conf/yarn-site.xml:ro
      - ./hadoop-config/mapred-site.xml:/etc/hadoop/conf/mapred-site.xml:ro   
    networks:
      - hadoop

  hive-postgres:
    image: postgres:14
    container_name: hive-postgres
    hostname: hive-postgres
    env_file: 
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - metastore_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hadoop

  hive-metastore:
    build:
      context: .
      dockerfile: Dockerfile.hive
    container_name: hive-metastore
    hostname: hive-metastore
    command: ["/bin/bash", "/start-metastore.sh"]
    env_file: 
      - .env
    environment:
      - HADOOP_CONF_DIR=/etc/hadoop/conf
      - HIVE_CONF_DIR=/opt/hive/conf        
      - HIVE_DATABASE_USER=${POSTGRES_USER}
      - HIVE_DATABASE_PASSWORD=${POSTGRES_PASSWORD}        
      - SERVICE_NAME=metastore
      - DB_DRIVER=postgres 
    ports:
      - 9083:9083
    depends_on:
      namenode:
        condition: service_healthy
      hive-postgres:
        condition: service_healthy
    volumes:
      - ./conf:/opt/hive/conf:ro
      - ./hadoop-config:/etc/hadoop/conf:ro      
      - ./start-metastore.sh:/start-metastore.sh    
    networks:
      - hadoop 

  hive-server:
    build:
      context: .
      dockerfile: Dockerfile.hive
    container_name: hive-server
    hostname: hive-server
    env_file: 
      - .env
    entrypoint: ["/bin/bash", "/start-hiveserver2.sh"]
    environment:
      - SERVICE_NAME=hiveserver2        
      - DB_DRIVER=postgres
      # Indispensable pour parler à HDFS
      - HADOOP_CONF_DIR=/etc/hadoop/conf        
      - HIVE_CONF_DIR=/opt/hive/conf
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      # Pour mapper les credentials .env vers le XML
      - HIVE_DATABASE_USER=${POSTGRES_USER}
      - HIVE_DATABASE_PASSWORD=${POSTGRES_PASSWORD}  
    ports:
      - 10000:10000  # JDBC/Beeline
      - 10002:10002  # Web UI
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
      nodemanager:
        condition: service_started
      resourcemanager:
        condition: service_started
      hive-postgres:
        condition: service_healthy
      hive-metastore:
        condition: service_started
    volumes:
      - ./start-hiveserver2.sh:/start-hiveserver2.sh
      - tez-share:/tez
      # Volume de configuration Hadoop (liaison HDFS)
      - ./hadoop-config:/etc/hadoop/conf:ro
      # Volume de configuration Hive (liaison Postgres)
      - ./conf:/opt/hive/conf:ro
      # Persistance des logs pour debug
      - ./logs/hive-server:/opt/hive/logs  
    networks:
      - hadoop

secrets:
  api_key:
    file: ./api_key.txt

volumes:
  namenode_data:
  datanode_data:
  metastore_db_data:
  tez-share:

networks:
  hadoop:    
    name: hadoop